<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calendário 2026</title>

<style>
:root { --yellow: #ffd600; }

body {
  font-family: Arial, sans-serif;
  padding: 5px;
  background-image: url('img/gears.jpg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  position: relative;
}
body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  z-index: -1;
}

/* Cabeçalho com links de ano */
#year-links {
  display: flex;
  justify-content: center;
  gap: 30px;
  margin: 10px 0 20px 0;
  font-weight: bold;
  font-size: 26px;
  color: #ffffff;
}
#year-links a { text-decoration: none; color: #ffffff; font-weight: bold; transition: color 0.3s; }
#year-links a:hover { color: #ffeb3b; }

/* Meses */
.month {
  width: 105%;
  max-width: 1200px;
  margin: 40px auto;
  padding: 12px;
  border-radius: 15px;
  box-shadow: 0 6px 18px rgba(0,0,0,0.15);
  background-image: url('img/image.jpg');
  background-size: cover;
  background-position: center;
  background-repeat: no-repeat;
  border: 4px solid #1976d2;
  position: relative;
  box-sizing: border-box;
}
.month::before {
  content: "";
  position: absolute;
  inset: 0;
  background-color: rgba(255,255,255,0.4);
  border-radius: 15px;
  z-index: 0;
}
.month > * { position: relative; z-index: 1; }

/* Month Title centralizado, pulsante */
.month-title {
  text-align: center;
  font-size: 36px;
  font-weight: bold;
  color: #6b5cee;
  margin: 20px auto 30px auto;
  display: block;
  background: transparent;
  border: none;
  animation: titleGlow 1.8s infinite alternate;
}
@keyframes titleGlow {
  0%   { text-shadow: 0 0 6px #ffffff, 0 0 12px #4fc3f7; }
  100% { text-shadow: 0 0 14px #ffffff, 0 0 28px #4fc3f7; }
}

/* Dia atual destacado */
.day.today {
  position: relative;
  border: 3px solid var(--yellow);
  border-radius: 10px;
  box-shadow: 0 0 15px rgba(253, 216, 53, 0.7);
  z-index: 2;
}

/* Engrenagem orbitando a borda do dia today */
.day.today .gear-orbit {
  position: absolute;
  width: 16px;
  height: 16px;
  z-index: 10;               /* 🔑 ESSENCIAL */
  pointer-events: none;
  animation: rectOrbit 25s linear infinite;
}

@keyframes rectOrbit {
  0%   { top: 0%; left: 0%; transform: translate(-50%, -50%) rotate(0deg); }
  25%  { top: 0%; left: 100%; transform: translate(-50%, -50%) rotate(90deg); }
  50%  { top: 100%; left: 100%; transform: translate(-50%, -50%) rotate(180deg); }
  75%  { top: 100%; left: 0%; transform: translate(-50%, -50%) rotate(270deg); }
  100% { top: 0%; left: 0%; transform: translate(-50%, -50%) rotate(360deg); }
}

/* Calendário */
.calendar { display:flex; flex-wrap:wrap; width:100%; gap:5px; }
.weekday, .day {
  width: calc(100% / 7 - 5px);
  border-radius:8px; border:1px solid #ccc;
  text-align:center; box-sizing:border-box;
  min-height:70px; display:flex; flex-direction:column;
  justify-content:center; align-items:center; word-wrap:break-word;
  transition: transform 0.2s, box-shadow 0.2s;
}
.weekday { font-weight:bold; font-size:18px; background-color:#1976d2; color:white; min-height:50px; display:flex; align-items:center; justify-content:center; }
.day { font-size:16px; padding:8px; background-color: rgba(255,255,255,0.9); position: relative; }
.day.green { background-color: rgba(168, 230, 162, 0.85); }
.day.red { background-color: rgba(248, 161, 161, 0.85); }
.day.grey { background-color: transparent; border: none; }
.day span { display:block; }
.day .date { font-weight:bold; font-size:20px; margin-bottom:4px; color:#111; }
.day .name { font-size:13px; font-weight:700; color:#333; white-space: nowrap; }
.day:hover { transform: translateY(-3px); box-shadow:0 4px 10px rgba(0,0,0,0.15); }

/* Feriados pulsantes */
.holiday {
  background-color:#d32f2f !important;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
  animation: pulseHoliday 1.5s infinite alternate;
  border:none;
}
@keyframes pulseHoliday {
  0% { transform: scale(1); box-shadow:0 0 5px #f44336; }
  50% { transform: scale(1.05); box-shadow:0 0 15px #f44336; }
  100% { transform: scale(1); box-shadow:0 0 5px #f44336; }
}

/* Tooltip central */
.tooltip-central {
  position: fixed;
  top:50%; left:50%;
  transform: translate(-50%, -50%);
  background-color:#333; color:#fff;
  padding:15px 25px; border-radius:12px;
  font-size:18px;
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
  display:none;
  z-index:1000;
  text-align:center;
}

/* Responsividade */
@media (max-width:600px){ 
  .month-title{font-size:28px;} 
  .weekday{font-size:14px;} 
  .day{min-height:50px;font-size:12px;} 
  .day .date{font-size:16px;} 
  .day .name{font-size:12px; line-height:1.1;} 
}
@media (max-width:400px){ 
  .month{width:98%; padding:6px;}
  .month-title{font-size:24px;}
  .weekday{font-size:12px; min-height:40px;}
  .day{min-height:50px;font-size:10px;}
  .day .date{font-size:14px;}
  .day .name{font-size:10px; line-height:1.1;}
}

/* Rodapé */
.footer {
  text-align:center;
  font-size:16px;
  color:#fff;
  background-color: rgba(0,0,0,0.5);
  padding:12px 0;
  border-radius:10px;
  margin-top:40px;
  box-shadow:0 2px 6px rgba(0,0,0,0.3);
  position: relative;
}
.footer .highlight {
  font-weight:bold;
  color:#ffeb3b;
  text-shadow:0 0 5px #ffeb3b,0 0 10px #ffeb3b,0 0 15px #ffd700;
  animation:glow 2s infinite alternate;
}
@keyframes glow {
  from {text-shadow:0 0 5px #ffeb3b,0 0 10px #ffeb3b,0 0 15px #ffd700;}
  to   {text-shadow:0 0 10px #ffeb3b,0 0 20px #ffeb3b,0 0 25px #ffd700;}
}
</style>
</head>

<body>

<div id="year-links">
  <a href="2025.html">2025</a>
  <a href="2026.html">2026</a>
</div>

<div id="calendar-container"></div>
<div class="tooltip-central" id="tooltip"></div>

<script>
const year = 2026;

const tooltip = document.getElementById("tooltip");

const months = [
  { name: "Janeiro", month: 0 },
  { name: "Fevereiro", month: 1 },
  { name: "Março", month: 2 },
  { name: "Abril", month: 3 },
  { name: "Maio", month: 4 },
  { name: "Junho", month: 5 },
  { name: "Julho", month: 6 },
  { name: "Agosto", month: 7 },
  { name: "Setembro", month: 8 },
  { name: "Outubro", month: 9 },
  { name: "Novembro", month: 10 },
  { name: "Dezembro", month: 11 }
];

const weekdays = ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];

// ===== ESCALA 3x3 =====
const nomes = ["Gabriel","Renato"];
const limite = 3;

// 29/12/2025 = Gabriel (1)
const baseEscalaUTC = Date.UTC(2025, 11, 29);

// ===== FERIADOS (somente nacionais + 19/03) =====
const feriados = {
  "01-01": "Confraternização Universal",
  "19-03": "Dia de São José – Padroeiro da Cidade",
  "03-04": "Sexta-feira Santa (Paixão de Cristo)",
  "21-04": "Tiradentes",
  "01-05": "Dia do Trabalho",
  "04-06": "Corpus Christi",
  "07-09": "Independência do Brasil",
  "12-10": "Nossa Senhora Aparecida",
  "02-11": "Finados",
  "15-11": "Proclamação da República",
  "20-11": "Consciência Negra",
  "25-12": "Natal"
};


const today = new Date();

months.forEach(m => {
  const monthDiv = document.createElement("div");
  monthDiv.className = "month";
  monthDiv.id = `month-${m.month}`;

  monthDiv.innerHTML = `<div class="month-title">${m.name} ${year}</div>`;

  const calendar = document.createElement("div");
  calendar.className = "calendar";

  weekdays.forEach(d => {
    calendar.innerHTML += `<div class="weekday">${d}</div>`;
  });

  const firstDay = new Date(year, m.month, 1).getDay();
  const numDays  = new Date(year, m.month + 1, 0).getDate();

  let day = 1;

  for (let i = 0; i < 42; i++) {
    const cell = document.createElement("div");
    cell.className = "day";

    if (i < firstDay || day > numDays) {
      cell.classList.add("grey");
    } else {

      // ===== ESCALA =====
      const dataAtualUTC = Date.UTC(year, m.month, day);
      const diffDias = Math.floor((dataAtualUTC - baseEscalaUTC) / 86400000);
      const indiceNome = Math.floor(diffDias / limite) % nomes.length;
      const nome = nomes[indiceNome];

      cell.innerHTML = `
        <span class="date">${day}</span>
        <span class="name">${nome}</span>
      `;
      cell.classList.add(nome === "Renato" ? "green" : "red");

      // ===== FERIADO + TOOLTIP =====
      const key = `${String(day).padStart(2,"0")}-${String(m.month+1).padStart(2,"0")}`;

      if (feriados[key]) {
        const tooltipText = `${String(day).padStart(2,"0")}/${String(m.month+1).padStart(2,"0")}/2026 - ${feriados[key]}`;

        cell.classList.add("holiday");
        cell.setAttribute("data-tooltip", tooltipText);

        // Desktop
        cell.addEventListener("mouseenter", () => {
          tooltip.style.display = "block";
          tooltip.textContent = tooltipText;
        });

        cell.addEventListener("mouseleave", () => {
          tooltip.style.display = "none";
        });

        // Mobile / touch
        cell.addEventListener("click", () => {
          tooltip.style.display = "block";
          tooltip.textContent = tooltipText;

          setTimeout(() => {
            tooltip.style.display = "none";
          }, 2000);
        });
      }

      // ===== DIA ATUAL + ENGRENAGEM =====
      if (
        day === today.getDate() &&
        m.month === today.getMonth() &&
        year === today.getFullYear()
      ) {
        cell.classList.add("today");

        const gear = document.createElement("img");
        gear.src = "img/gear.png";
        gear.className = "gear-orbit";
        cell.appendChild(gear);
      }

      day++;
    }

    calendar.appendChild(cell);
  }

  monthDiv.appendChild(calendar);
  document.getElementById("calendar-container").appendChild(monthDiv);
});

// ===== SCROLL PARA MÊS ATUAL =====
if ("scrollRestoration" in history) {
  history.scrollRestoration = "manual";
}

window.addEventListener("load", () => {
  if (today.getFullYear() === year) {
    document
      .getElementById(`month-${today.getMonth()}`)
      ?.scrollIntoView({ behavior: "smooth", block: "start" });
  }
});


// Esconde tooltip ao rolar
window.addEventListener("scroll", () => {
  tooltip.style.display = "none";
});
</script>

</body>
</html>
